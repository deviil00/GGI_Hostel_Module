<div style="display:flex;justify-content:space-between;align-items:baseline;
            padding:7px 0;border-bottom:1px solid var(--border-light)">
  <span style="font-size:11.5px;color:var(--text-3);font-weight:600;text-transform:uppercase;
               letter-spacing:.4px;flex-shrink:0;margin-right:12px">{{ label }}</span>
  <span style="font-size:13px;color:var(--text-1);font-weight:500;text-align:right">
    {% if value and value != " years" %}{{ value }}{% else %}<span style="color:var(--text-3)">—</span>{% endif %}
  </span>
</div>
